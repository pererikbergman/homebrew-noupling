name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    name: Update noupling formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          TAG="${{ github.event.client_payload.tag }}"
          URL="https://github.com/pererikbergman/noupling/archive/refs/tags/${TAG}.tar.gz"

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/noupling.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/noupling.rb

          echo "Updated formula to ${VERSION}:"
          cat Formula/noupling.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/noupling.rb
          git commit -m "Update noupling to ${{ github.event.client_payload.version }}"
          git push
